<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Pika 🚀</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* SMOOTH SCROLL */
html{
  scroll-behavior:smooth;
}

/* ANIMATED GRADIENT BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#ff9900,#00ff66,#0099ff);
  background-size:600% 600%;
  animation:bgMove 12s infinite;
  filter:blur(100px) brightness(0.3);
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */
.nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.nav a{
  color:#00ff99;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding-top:120px;
}

.logo{
  width:130px;
  border-radius:20px;
  box-shadow:0 0 40px #fff;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

h1{
  font-size:60px;
  background:linear-gradient(90deg,#ffd700,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  opacity:0.8;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 40px;
  background:#00ff66;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 30px #00ff66;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:250px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px #00ff66;
}

/* CONTRACT */
.contract{
  background:#111;
  padding:15px;
  border-radius:10px;
  display:inline-block;
  cursor:pointer;
}

.copy{
  margin-top:10px;
  color:#00ff66;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

/* PARTICLES */
.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:#fff;
  border-radius:50%;
  opacity:0.5;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<!-- NAV -->
<div class="nav">
  <div>🐹 Chubby Pika</div>
  <div>
    <a href="#about">About</a>
    <a href="#tokenomics">Tokenomics</a>
    <a href="#contract">Contract</a>
    <a href="https://t.me/ChubbyPika">Telegram</a>
    <a href="https://x.com/ChubbyPikaX">Twitter</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://i.postimg.cc/3wXyV5LD/Chat-GPT-Image-Apr-20-2026-11-02-21-PM.png" class="logo">
  <h1>CHUBBY PIKA</h1>
  <p class="subtitle">🚀 The next viral memecoin</p>
  <a href="#" class="btn">BUY NOW</a>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About</h2>
  <p>💲NextGen memecoin 👑make You millionaire 🔥.</p>
</div>

<!-- TOKENOMICS -->
<div class="section" id="tokenomics">
  <h2>Tokenomics</h2>
  <div class="cards">
    <div class="card">Supply: 1B</div>
    <div class="card">Tax: 0%</div>
    <div class="card">LP Locked 🔒</div>
    <div class="card">Community Driven</div>
  </div>
</div>

<!-- CONTRACT -->
<div class="section" id="contract">
  <h2>Contract</h2>
  <div class="contract" onclick="copyCA()">
    <span id="ca">Coming Soon...</span>
  </div>
  <div class="copy">Click to copy</div>
</div>

<!-- FOOTER -->
<div class="footer">
  chubbypika.com © 2026
</div>

<script>

/* SCROLL ANIMATION */
const sections=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("show");
    }
  });
});

/* COPY */
function copyCA(){
  const text=document.getElementById("ca").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
