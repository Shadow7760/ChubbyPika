<style>
body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:20px;
  transition:0.3s;
}
.nav a:hover{color:#fff;}

.hero{
  text-align:center;

  color:#aaa;
}

/* BUTTON */
.btn{

  padding:14px 32px;
  background:#fff;
  color:#000;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
  font-weight:600;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  max-width:900px;
  margin:auto;
  text-align:center;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#111;
  padding:25px;
  border-radius:12px;
  border:1px solid #222;
}

/* CONTRACT */
.contract{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:20px;

/* FOOTER */

</body>
</html>
