<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Pika 🚀</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

html{scroll-behavior:smooth;}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#ff9900,#00ff66,#0099ff);
  background-size:600% 600%;
  animation:bgMove 12s infinite;
  filter:blur(100px) brightness(0.3);
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.nav a{
  color:#00ff99;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.hero{
  text-align:center;
  padding-top:120px;
}

.logo{
  width:130px;
  border-radius:20px;
  box-shadow:0 0 40px #fff;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

h1{
  font-size:60px;
  background:linear-gradient(90deg,#ffd700,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{opacity:0.8;}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 40px;
  background:#00ff66;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 30px #00ff66;
}

.socials{margin-top:25px;}

.socials a{
  display:inline-flex;
  margin:5px;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  background:rgba(255,255,255,0.05);
  color:#fff;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  font-size:14px;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
  z-index:9999;
}

.popup.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div>🐹 Chubby Pika</div>
</div>

<div class="hero">
  <img src="https://i.postimg.cc/3wXyV5LD/Chat-GPT-Image-Apr-20-2026-11-02-21-PM.png" class="logo">
  <h1>CHUBBY PIKA</h1>
  <p class="subtitle">🚀 The next viral memecoin</p>

  <a href="https://jup.ag/swap/SOL-YOUR_TOKEN_ADDRESS" target="_blank" class="btn">
  Buy on Jupiter
  </a>

  <div class="socials">
    <a href="https://t.me/ChubbyPika">Telegram</a>
    <a href="https://x.com/ChubbyPikaX">Twitter</a>
  </div>
</div>

<div id="popup" class="popup"></div>

<script>
// 🔥 RANDOM WALLET GENERATOR
function randomWallet(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz123456789";
  let str="";
  for(let i=0;i<6;i++) str+=chars[Math.floor(Math.random()*chars.length)];
  return str+"..."+chars[Math.floor(Math.random()*chars.length)]+"X";
}

// 🔥 RANDOM AMOUNT
function randomAmount(){
  return (Math.random()*5+0.1).toFixed(2);
}

// 🔥 POPUP MESSAGES
function generateMessage(){
  const types=[
    `💰 ${randomWallet()} bought ${randomAmount()} SOL`,
    `🚀 ${randomWallet()} swapped SOL`,
    `🐳 Whale ${randomWallet()} entered`,
    `📈 ${randomWallet()} aped in`,
    `💎 New holder ${randomWallet()}`
  ];
  return types[Math.floor(Math.random()*types.length)];
}

function showPopup(){
  const popup=document.getElementById("popup");
  popup.innerText=generateMessage();
  popup.classList.add("show");

  setTimeout(()=>popup.classList.remove("show"),3000);
}

setInterval(showPopup, 4000);
</script>

</body>
</html>
