<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Pika 🚀</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://i.postimg.cc/Nj1ff8Rk/Chat-GPT-Image-Apr-20-2026-11-02-42-PM.png') center/cover no-repeat;
  filter:blur(12px) brightness(0.25);
  z-index:-1;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

.nav a{
  color:#00ff99;
  text-decoration:none;
  margin-left:15px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding-top:120px;
}

.logo{
  width:120px;
  border-radius:20px;
  box-shadow:0 0 25px #fff;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

h1{
  font-size:50px;
  background:linear-gradient(90deg,#ffd700,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 35px;
  background:#00ff66;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 20px #00ff66;
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:250px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

/* CONTRACT */
.contract{
  margin-top:20px;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <div>🐹 Chubby Pika</div>
  <div>
    <a href="https://t.me/ChubbyPika">Telegram</a>
    <a href="https://x.com/ChubbyPikaX">Twitter</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://i.postimg.cc/3wXyV5LD/Chat-GPT-Image-Apr-20-2026-11-02-21-PM.png" class="logo">
  <h1>CHUBBY PIKA</h1>
  <p>🚀 The next viral memecoin</p>
  <a href="#" class="btn">BUY NOW</a>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About</h2>
  <p>Chubby Pika is a fun, community-driven memecoin built for massive growth and viral energy.</p>
</div>

<!-- TOKENOMICS -->
<div class="section">
  <h2>Tokenomics</h2>
  <div class="cards">
    <div class="card">Supply: 1B</div>
    <div class="card">Tax: 0%</div>
    <div class="card">LP Locked 🔒</div>
    <div class="card">Community Driven</div>
  </div>
</div>

<!-- CONTRACT -->
<div class="section">
  <h2>Contract</h2>
  <div class="contract" id="ca">
    Coming Soon...
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  chubbypika.com © 2026
</div>

</body>
</html>
