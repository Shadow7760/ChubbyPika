<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Pika 🚀</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

html{scroll-behavior:smooth;}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#ff9900,#00ff66,#0099ff);
  background-size:600% 600%;
  animation:bgMove 12s infinite;
  filter:blur(100px) brightness(0.3);
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.hero{
  text-align:center;
  padding-top:120px;
}

.logo{
  width:130px;
  border-radius:20px;
  box-shadow:0 0 40px #fff;
}

h1{
  font-size:60px;
  background:linear-gradient(90deg,#ffd700,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 40px;
  background:#00ff66;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
}

/* POPUP (BOTTOM LEFT) */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:14px;
  border-radius:10px;
  font-size:14px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.popup.show{
  opacity:1;
  transform:translateY(0);
}

/* TOP RIGHT NOTIFICATION */
.top-popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:12px 16px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  transform:translateY(-20px);
  transition:0.3s;
}

.top-popup.show{
  opacity:1;
  transform:translateY(0);
}

/* COUNTER */
.counter{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff66;
  color:#000;
  padding:12px 16px;
  border-radius:10px;
  font-weight:bold;
}

/* SOUND BUTTON */
.sound-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="hero">
  <img src="https://i.postimg.cc/3wXyV5LD/Chat-GPT-Image-Apr-20-2026-11-02-21-PM.png" class="logo">
  <h1>CHUBBY PIKA</h1>

  <a href="https://jup.ag/swap/SOL-YOUR_TOKEN_ADDRESS" target="_blank" class="btn">
  Buy Now
  </a>
</div>

<!-- UI ELEMENTS -->
<div id="popup" class="popup"></div>
<div id="topPopup" class="top-popup"></div>
<div id="counter" class="counter">Buys: 0</div>
<div id="soundBtn" class="sound-btn">🔊 Sound Off</div>

<script>
// RANDOM WALLET
function randomWallet(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz123456789";
  let str="";
  for(let i=0;i<6;i++) str+=chars[Math.floor(Math.random()*chars.length)];
  return str+"...";
}

// RANDOM AMOUNT
function randomAmount(){
  return (Math.random()*5+0.2).toFixed(2);
}

// COUNTER
let buyCount=0;

// SOUND
let soundEnabled=false;
const soundBtn=document.getElementById("soundBtn");

soundBtn.onclick=()=>{
  soundEnabled=!soundEnabled;
  soundBtn.innerText=soundEnabled ? "🔊 Sound On" : "🔇 Sound Off";
};

// SOUND FUNCTION
function playSound(){
  if(!soundEnabled) return;
  const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

// POPUPS
function showBottomPopup(msg){
  const popup=document.getElementById("popup");
  popup.innerText=msg;
  popup.classList.add("show");
  setTimeout(()=>popup.classList.remove("show"),3000);
}

function showTopPopup(msg){
  const top=document.getElementById("topPopup");
  top.innerText=msg;
  top.classList.add("show");
  setTimeout(()=>top.classList.remove("show"),2500);
}

// MAIN LOOP
function generateEvent(){
  const wallet=randomWallet();
  const amount=randomAmount();

  const msg=`💰 ${wallet} bought ${amount} SOL`;

  showBottomPopup(msg);
  showTopPopup("New Buy Detected 🚀");

  buyCount++;
  document.getElementById("counter").innerText="Buys: "+buyCount;

  playSound();
}

setInterval(generateEvent, 4000);
</script>

</body>
</html>
