<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Pika 🚀</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

html{scroll-behavior:smooth;}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#ff9900,#00ff66,#0099ff);
  background-size:600% 600%;
  animation:bgMove 12s infinite;
  filter:blur(100px) brightness(0.3);
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🔥 FLOATING PARTICLES */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#fff;
  border-radius:50%;
  opacity:0.5;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* NAV */
.nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.nav a{
  color:#00ff99;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding-top:120px;
}

.logo{
  width:130px;
  border-radius:20px;
  box-shadow:0 0 40px #fff;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

h1{
  font-size:60px;
  background:linear-gradient(90deg,#ffd700,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{opacity:0.8;}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 40px;
  background:#00ff66;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 30px #00ff66;
  transition:0.3s;
}

.btn:hover{transform:scale(1.1);}

/* SOCIALS */
.socials{margin-top:25px;}

.socials a{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin:5px;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  color:#fff;
  border:1px solid rgba(255,255,255,0.1);
}

/* 🔥 SECTION TITLES IMPROVED */
.section h2{
  font-size:34px;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00ff66,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(0,255,102,0.3);
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:250px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

/* CONTRACT */
.contract{
  background:#111;
  padding:15px;
  border-radius:10px;
  display:inline-block;
  cursor:pointer;
}

.copy{color:#00ff66;}

.footer{text-align:center;padding:30px;opacity:0.6;}

/* HOW TO BUY */
.steps{
  max-width:700px;
  margin:40px auto 0;
  text-align:left;
}

.step{
  display:flex;
  gap:15px;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.step-number{
  min-width:35px;
  height:35px;
  border-radius:50%;
  background:#00ff66;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:12px 18px;
  border-radius:10px;
  font-size:14px;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
  z-index:9999;
}

.popup.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<!-- NAV -->
<div class="nav">
  <div>🐹 Chubby Pika</div>
  <div>
    <a href="#about">About</a>
    <a href="#tokenomics">Tokenomics</a>
    <a href="#contract">Contract</a>
    <a href="#buy">How to Buy</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://i.postimg.cc/3wXyV5LD/Chat-GPT-Image-Apr-20-2026-11-02-21-PM.png" class="logo">
  <h1>CHUBBY PIKA</h1>
  <p class="subtitle">🚀 The next viral memecoin</p>

  <a href="https://jup.ag/swap/SOL-YOUR_TOKEN_ADDRESS" target="_blank" class="btn">
  Buy on Jupiter
  </a>

  <a href="https://dexscreener.com/solana/YOUR_PAIR_ADDRESS" target="_blank"
  class="btn" style="background:#111;color:#fff;margin-left:10px;">
  View Chart
  </a>

  <div class="socials">
    <a href="https://t.me/ChubbyPika" target="_blank">📢 Telegram</a>
    <a href="https://x.com/ChubbyPikaX" target="_blank">🐦 Twitter</a>
  </div>
</div>

<!-- REST SAME -->
<!-- (About, Tokenomics, Contract, How to Buy unchanged) -->

<div id="popup" class="popup"></div>

<script>
const messages=["🔥 Someone bought","🚀 New holder joined","💰 Big buy"];
function showPopup(){
  const popup=document.getElementById("popup");
  popup.innerText=messages[Math.floor(Math.random()*messages.length)];
  popup.classList.add("show");
  setTimeout(()=>popup.classList.remove("show"),3000);
}
setInterval(showPopup,5000);
</script>

</body>
</html>
